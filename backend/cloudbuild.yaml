steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/olaf-backend', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/olaf-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - olaf-backend
      - --image=gcr.io/$PROJECT_ID/olaf-backend
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=2Gi
      - --cpu=2
      - --timeout=300
      - --concurrency=80
images:
  - 'gcr.io/$PROJECT_ID/olaf-backend'

options:
  logging: CLOUD_LOGGING_ONLY
