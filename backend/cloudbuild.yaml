steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/olaf-backend', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/olaf-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - olaf-backend
      - --image=gcr.io/$PROJECT_ID/olaf-backend
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=2Gi
      - --cpu=2
      - --timeout=300
      - --concurrency=80
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=olaf-dev-7a5d4,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=False,GCS_ARTIFACTS_BUCKET=olaf-artifacts,LOG_LEVEL=info,ENABLE_DEV_UI=false,ALLOWED_ORIGINS=https://your-frontend-domain.com
      - --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,FIREBASE_ADMIN_PROJECT_ID=FIREBASE_ADMIN_PROJECT_ID:latest,FIREBASE_ADMIN_CLIENT_EMAIL=FIREBASE_ADMIN_CLIENT_EMAIL:latest,FIREBASE_ADMIN_PRIVATE_KEY=FIREBASE_ADMIN_PRIVATE_KEY:latest
images:
  - 'gcr.io/$PROJECT_ID/olaf-backend'

options:
  logging: CLOUD_LOGGING_ONLY
